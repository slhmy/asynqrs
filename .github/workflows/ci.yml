name: CI

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always
  ASYNQ_RS_REDIS_URL: redis://127.0.0.1:6379

jobs:
  test:
    name: Rust
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:5.0
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Install buf
        uses: bufbuild/buf-setup-action@v1

      - name: Lint proto schemas
        run: buf lint

      - name: Check formatting
        run: cargo fmt --check

      - name: Run tests
        run: cargo test
